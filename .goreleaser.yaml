version: 2

project_name: lazyconfigs

before:
  hooks:
    - go mod tidy

builds:
  - main: ./cmd/lazyconfigs
    binary: lazyconfigs
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - linux
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X lazyconfigs/internal/version.Version={{ .Version }}

archives:
  - formats:
      - tar.gz
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: checksums.txt

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^chore:"
      - "^ci:"

homebrew_casks:
  - name: lazyconfigs
    repository:
      owner: thousandbrainsproject
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    directory: Casks
    homepage: "https://github.com/thousandbrainsproject/lazyconfigs"
    description: "TUI for browsing and editing Hydra/YAML configs"
    hooks:
      post:
        install: |
          if OS.mac?
            system_command "/usr/bin/xattr", args: ["-dr", "com.apple.quarantine", "#{staged_path}/lazyconfigs"]
          end

release:
  github:
    owner: thousandbrainsproject
    name: lazyconfigs
